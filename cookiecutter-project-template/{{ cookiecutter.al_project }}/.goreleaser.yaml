# SPDX-FileCopyrightText: {{cookiecutter.year}} {{cookiecutter.company}}
#
# SPDX-License-Identifier: MIT
---
project_name: {{ cookiecutter.al_project }}

version: 2

before:
  hooks:
    - go generate ./...
    - go mod vendor

builds:
  - id: {{ cookiecutter.al_project }}
    binary: {{ cookiecutter.al_project }}
    tags:
      - webserver
    flags:
      - -trimpath
    ldflags:
      - -s -w -extldflags '-static'
{% raw %}
      - -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.CommitDate}}
{% endraw %}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
{% raw %}
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - formats: [ 'tar.gz' ]
    files:
      - vendor\
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [ 'zip' ]

{% endraw %}

nfpms:
  - id: {{ cookiecutter.al_project }}
    package_name: {{ cookiecutter.al_project }}
    ids:
      - {{ cookiecutter.al_project }}
    vendor: {{cookiecutter.company }}
    homepage: {{ cookiecutter.company_url }}
    maintainer: {{ cookiecutter.author_name }} <{{ cookiecutter.author_email }}>
    description: |-
      {{ cookiecutter.al_name }}
    license: {{ cookiecutter.company }} {{ cookiecutter.year }}
    formats:
      - deb
    bindir: /usr/bin
    version_metadata: git
    section: default
    priority: extra
    contents:
      - src: contrib/{{ cookiecutter.al_project }}.service
        dst: /lib/systemd/system/{{ cookiecutter.al_project }}.service
        type: "config"
    scripts:
      postinstall: "contrib/postinstall.bash"
      postremove: "contrib/postremove.bash"

{% raw %}
checksum:
  name_template: "{{.ProjectName}}_{{.Version}}.sha256"
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"
  {% endraw %}

dockers_v2:
  - id: {{ cookiecutter.al_project }}-image
    ids:
      - "{{ cookiecutter.al_project }}"
    images:
      - "{{ cookiecutter.al_project }}"
    tags:
      - "{% raw %}{{ .Tag }}{% endraw %}"
      - "latest"
    dockerfile: Dockerfile
    platforms:
      - linux/amd64
      - linux/arm64

changelog:
  sort: asc
  groups:
    - title: Features
      regexp: "^.*feat[(\\w)]*:+.*$"
      order: 0
    - title: "Bug fixes"
      regexp: "^.*fix[(\\w)]*:+.*$"
      order: 1
    - title: Others
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^test:"
