# SPDX-FileCopyrightText: {{cookiecutter.year}} {{cookiecutter.company}}
#
# SPDX-License-Identifier: MIT

name: {{ cookiecutter.al_project }}

on:
  workflow_dispatch:
   inputs:
      image_name:
        description: 'Image name'
        required: true
        default: {{ cookiecutter.al_project }}
      image_tag:
        description: 'Tag (e.g. v1.0.0)'
        required: true
        default: 'latest'

permissions:
  contents: write
  packages: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare Environment
        uses: ./.github/actions/prepare
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.1

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare Environment
        uses: ./.github/actions/prepare
      - name: Build
        run: go build -v ./...
      - name: Docker Login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{'{{'}} github.repository_owner {{'}}'}}
          password: ${{'{{'}} secrets.GITHUB_TOKEN {{'}}'}}

  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare Environment
        uses: ./.github/actions/prepare
      - name: Run Unit Test
        run: go test -v ./...

  test-discovery:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare Environment
        uses: ./.github/actions/prepare
      - name: Run Test Discovery
        run: |
          if [ -f ./discovery.sh ]; then
            bash ./discovery.sh
          else
            echo "No discovery script found."
          fi

  test-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare Environment
        uses: ./.github/actions/prepare
      - name: Run Test Api
        run: |
          if [ -f ./test-api.sh ]; then
            bash ./test-api.sh
          else
            echo "No test api script found."
          fi

  validate-asset:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare Environment
        uses: ./.github/actions/prepare
      - name: Run Validate Asset
        run: |
          if [ -f ./validate-asset.sh ]; then
            pip install --upgrade argcomplete
            pip install linkml-validator
            bash ./validate-asset.sh
          else
            echo "No validate asset script found."
          fi

  test-registration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare Environment
        uses: ./.github/actions/prepare
      - name: Login to Docker Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{'{{'}} github.actor {{'}}'}}
          password: ${{'{{'}} secrets.GITHUB_TOKEN {{'}}'}}
      - name: Pull gRPC Server Registry Image
        run: docker pull ghcr.io/industrial-asset-hub/iah/grpc-server-registry:0.1.6
      - name: Run grpc server registry
        run: docker run -d --name grpc-server-registry -p 50051:50051 ghcr.io/industrial-asset-hub/iah/grpc-server-registry:0.1.6
      - name: Wait for registry
        run: |
          echo "Waiting for gRPC registry to start..."
          timeout 30s bash -c 'until nc -z localhost 50051; do sleep 10; done'
          echo "gRPC registry is up and running."
      - name: Run Test Registration
        run: |
          if [ -f ./registration.sh ]; then
            bash ./registration.sh
          else
            echo "No registration script found."
          fi

  release:
    runs-on: ubuntu-latest
    needs: [lint, build, unit-test, test-discovery, test-api, test-registration]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Prepare Environment
        uses: ./.github/actions/prepare
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and Push Multi-Arch Image
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --snapshot
        env:
          GITHUB_TOKEN: ${{'{{'}} secrets.GITHUB_TOKEN {{'}}'}}